<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전생 직업 테스트 | Life Test</title>
    <meta name="description" content="나의 전생은 어떤 모습이었을까? 테스트를 통해 과거 나의 직업을 알아보세요!">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">Life Test</div>
            <div class="hamburger-menu">☰</div>
            <nav class="full-screen-nav">
                <div class="close-button">X</div>
                <ul id="content-list"></ul>
            </nav>
        </header>

        <main class="main-content">
            <div class="content-wrapper">
                <article class="content-area">
                    <div id="quiz-section">
                        <h1 class="content-title">전생 직업 테스트</h1>
                        <p class="content-description">현재의 당신의 성향을 바탕으로 전생에 어떤 직업을 가졌을지 유추해 드립니다.</p>

                        <div class="question-container">
                            <div class="question current-question">
                                <p class="question-text">1. 새로운 모임에 나갔을 때 나의 행동은?</p>
                                <div class="options">
                                    <button class="option-button" data-type="E">먼저 다가가 말을 건넨다</button>
                                    <button class="option-button" data-type="I">누군가 말을 걸어줄 때까지 기다린다</button>
                                </div>
                            </div>
                        </div>

                        <div class="input-form">
                            <button class="cta-button">결과 보기</button>
                        </div>
                    </div>

                    <div id="result-section" style="display: none;">
                        <h2>당신의 전생 직업은?!</h2>
                        <p class="result-description">분석 결과가 여기에 나타납니다.</p>
                        <p class="result-type">결과: 왕실 직속 기사</p>
                        <div class="explore-banner">
                            <h3>다른 재미있는 테스트도 해보세요!</h3>
                            <div class="explore-item">
                                <div class="explore-text">
                                    <p class="explore-title">다른 콘텐츠 타이틀</p>
                                    <p class="explore-hook">클릭 유도 후킹 멘트</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </article>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Life Test. All rights reserved.</p>
        </footer>
    </div>

    <div class="loading-overlay">
        <div class="loading-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script>
        const quizData = [
            { question: "1. 숲 속에서 길을 잃었다면?", options: [{text: "직감적으로 길을 찾는다", val: "A"}, {text: "가진 도구를 활용해 나침반을 만든다", val: "B"}] },
            { question: "2. 여가 시간이 생겼다. 무엇을 할까?", options: [{text: "사람들과 모여 파티를 연다", val: "C"}, {text: "조용히 책을 읽으며 사색에 잠긴다", val: "D"}] },
            { question: "3. 누군가와 논쟁이 붙었다. 나는?", options: [{text: "논리적으로 조목조목 따진다", val: "B"}, {text: "상황을 원만하게 중재하려고 한다", val: "C"}] }
        ];

        let currentQ = 0;
        let scores = { A:0, B:0, C:0, D:0 };

        document.addEventListener('DOMContentLoaded', () => {
            const qText = document.querySelector('.question-text');
            const optsContainer = document.querySelector('.options');
            const ctaBtn = document.querySelector('.cta-button');

            function loadQ() {
                if(currentQ < quizData.length) {
                    qText.textContent = quizData[currentQ].question;
                    optsContainer.innerHTML = '';
                    quizData[currentQ].options.forEach(opt => {
                        optsContainer.innerHTML += `<button class="option-button" data-val="${opt.val}">${opt.text}</button>`;
                    });
                }
            }
            
            loadQ();

            optsContainer.addEventListener('click', (e) => {
                if(e.target.classList.contains('option-button')) {
                    scores[e.target.dataset.val]++;
                    currentQ++;
                    if(currentQ < quizData.length) loadQ();
                }
            });

            ctaBtn.addEventListener('click', () => {
                // 단순 결과 도출 로직
                let highest = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
                let title = "", desc = "";
                if(highest === 'A') { title = "용맹한 탐험가"; desc = "미지의 세계를 개척하는 것을 두려워하지 않았던 당신!"; }
                else if(highest === 'B') { title = "지혜로운 연금술사"; desc = "사물의 이치를 탐구하고 새로운 것을 발명하던 학자였습니다."; }
                else if(highest === 'C') { title = "카리스마 넘치는 족장"; desc = "사람들을 이끌고 공동체를 화합시키던 리더였습니다."; }
                else { title = "평화로운 수도사"; desc = "조용히 진리를 탐구하며 내면의 평화를 중시하던 삶을 살았습니다."; }

                document.querySelector('.result-type').textContent = `결과: ${title}`;
                document.querySelector('.result-description').textContent = desc;

                document.getElementById('quiz-section').style.display = 'none';
                const loadingOverlay = document.querySelector('.loading-overlay');
                const resultSection = document.getElementById('result-section');
                
                loadingOverlay.classList.add('show');
                setTimeout(() => {
                    loadingOverlay.classList.remove('show');
                    resultSection.style.display = 'block';
                }, 2000);
            });
        });
    </script>
</body>
</html>
