<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>무인도 생존 테스트 | Life Test</title>
    <meta name="description" content="갑자기 무인도에 떨어졌다! 과연 나는 며칠이나 버틸 수 있을까? 당신의 생존력을 테스트해보세요.">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <!-- 상단 헤더 -->
        <header class="header">
            <div class="logo">Life Test</div>
            <div class="hamburger-menu">☰</div>
            <nav class="full-screen-nav">
                <div class="close-button">X</div>
                <ul id="content-list"></ul>
            </nav>
        </header>

        <main class="main-content">
            <div class="content-wrapper">
                <article class="content-area">
                    <div id="quiz-section">
                        <h1 class="content-title">무인도 생존 테스트</h1>
                        <p class="content-description">조난 당한 당신! 과연 무인도에서 어떻게 살아남을 것인가? 당신의 생존 전략을 확인하세요.</p>

                        <div class="question-container">
                            <div class="question current-question">
                                <p class="question-text">1. 정신을 차려보니 무인도 해변이다. 가장 먼저 할 일은?</p>
                                <div class="options">
                                    <!-- 옵션 버튼들이 여기에 동적으로 로드됩니다 -->
                                </div>
                            </div>
                        </div>

                        <div class="input-form">
                            <button class="cta-button">결과 보기</button>
                        </div>
                    </div>

                    <!-- 결과 화면 -->
                    <div id="result-section" style="display: none;">
                        <h2>당신의 무인도 생존 결과는?!</h2>
                        <p class="result-description">생존 전략 분석 중...</p>
                        <p class="result-type">결과: 생존의 달인 (베어그릴스 급)</p>
                        
                        <div class="explore-banner">
                            <h3>다른 재미있는 테스트도 해보세요!</h3>
                            <div class="explore-item">
                                <div class="explore-text">
                                    <p class="explore-title">다른 콘텐츠 타이틀</p>
                                    <p class="explore-hook">클릭 유도 후킹 멘트</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </article>
            </div>
        </main>

        <!-- 푸터 -->
        <footer class="footer">
            <p>&copy; 2026 Life Test. All rights reserved.</p>
        </footer>
    </div>

    <!-- 로딩 오버레이 -->
    <div class="loading-overlay">
        <div class="loading-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script>
        const quizData = [
            { question: "1. 정신을 차려보니 무인도 해변이다. 가장 먼저 할 일은?", options: [ {text: "주변을 정찰하여 지형과 자원을 파악한다", score: 3}, {text: "해변에 SOS 구조 신호를 크게 그린다", score: 2}, {text: "마실 물과 식량을 먼저 찾아 헤맨다", score: 1}, {text: "일단 멘탈을 챙기기 위해 그늘에서 쉰다", score: 0} ]},
            { question: "2. 밤이 다가오고 있다. 잠자리는 어떻게 마련할까?", options: [ {text: "나무 위나 동굴 등 안전한 곳을 찾는다", score: 3}, {text: "간단히 나뭇가지로 비를 피할 공간을 만든다", score: 2}, {text: "모닥불을 피우고 그 옆에서 잔다", score: 1}, {text: "피곤해서 아무 데나 눕는다", score: 0} ]},
            { question: "3. 식량이 떨어졌다. 눈앞에 정체 모를 열매가 있는데, 어떻게 할까?", options: [ {text: "조금 맛보고 독성 여부를 확인한다", score: 2}, {text: "새나 다른 동물이 먹는지 지켜본다", score: 3}, {text: "배고파 죽겠는데 그냥 먹는다", score: 0}, {text: "먹지 않고 다른 식량을 찾아본다", score: 1} ]},
            { question: "4. 멀리 수평선에 배가 지나가는 것이 보인다. 당신의 행동은?", options: [ {text: "가장 눈에 띄게 큰 불을 피워 신호를 보낸다", score: 3}, {text: "소리를 지르거나 옷을 흔들어 필사적으로 알린다", score: 2}, {text: "지나갈 배는 지나갈 뿐... 체념한다", score: 0}, {text: "일단 숨어서 상황을 지켜본다", score: 1} ]},
            { question: "5. 동굴을 발견했다. 안으로 들어가 볼까?", options: [ {text: "안전 여부 확인 후 조심스럽게 탐험한다", score: 3}, {text: "위험할 것 같아 다른 곳을 찾아본다", score: 1}, {text: "밤새 머물 수 있는 좋은 장소라 생각하고 바로 들어간다", score: 0}, {text: "입구에 표시를 해두고 나중에 다시 온다", score: 2} ]},
            { question: "6. 비가 억수같이 쏟아진다. 어떻게 대처할까?", options: [ {text: "나뭇잎 등을 모아 빗물을 받는다", score: 3}, {text: "몸을 웅크리고 비가 그치기를 기다린다", score: 1}, {text: "비 맞으며 돌아다녀도 괜찮다", score: 0}, {text: "피할 곳을 찾아 뛰어간다", score: 2} ]},
            { question: "7. 야생 동물의 흔적을 발견했다. 나의 생각은?", options: [ {text: "먹이로 삼을 수 있을까?", score: 2}, {text: "위험하니 피해야겠다.", score: 3}, {text: "어디로 갔을까? 따라가 본다.", score: 1}, {text: "별로 신경 쓰지 않는다.", score: 0} ]},
            { question: "8. 무인도에서 당신에게 가장 중요한 것은?", options: [ {text: "생존에 필요한 도구와 지식", score: 3}, {text: "긍정적인 마음과 희망", score: 2}, {text: "안전한 잠자리와 휴식", score: 1}, {text: "구조될 것이라는 믿음", score: 0} ]}
        ];

        const results = [
            { maxScore: 8, title: "하루살이 생존자", desc: "야생에서의 생존은 당신에게 너무나 가혹합니다. 멘탈 붕괴와 함께 의욕을 상실하기 쉬워요. 빠르게 구조 신호를 보내는 것이 최우선입니다." },
            { maxScore: 14, title: "로빈슨 크루소 워너비", desc: "나름대로 노력은 하지만 서툰 솜씨로 고생을 사서 하는 스타일입니다. 기본적인 생존 기술을 익히고 계획을 세우는 연습이 필요해요. 혼자보다는 동료와 함께하는 것이 좋습니다." },
            { maxScore: 20, title: "의지의 한국인", desc: "끈질긴 생명력과 강한 의지로 어떤 난관도 헤쳐나가는 끈기의 아이콘입니다. 포기하지 않고 끝까지 버텨 결국 구조되는 모습을 보여줄 거예요. 약간의 지식만 더해진다면 완벽한 생존자가 될 수 있습니다." },
            { maxScore: 24, title: "생존의 달인 (베어그릴스 강림)", desc: "자연과 하나가 되어 무인도를 리조트처럼 즐기고 있습니다. 뛰어난 위기 대처 능력과 풍부한 지식으로 어떤 상황에서도 살아남을 수 있어요. 오히려 무인도에서 새로운 삶을 개척할지도 모릅니다!" }
        ];

        let currentQ = 0;
        let totalScore = 0;

        document.addEventListener("DOMContentLoaded", () => {
            const qText = document.querySelector(".question-text");
            const optsContainer = document.querySelector(".options");
            const ctaBtn = document.querySelector(".cta-button");

            function loadQ() {
                if(currentQ < quizData.length) {
                    qText.textContent = quizData[currentQ].question;
                    optsContainer.innerHTML = ""; // 기존 옵션 초기화
                    quizData[currentQ].options.forEach(opt => {
                        optsContainer.innerHTML += `<button class="option-button" data-score="${opt.score}">${opt.text}</button>`;
                    });
                } else {
                     // 모든 질문 완료 후 버튼 활성화 또는 이동 로직 (필요시 추가)
                }
            }

            optsContainer.addEventListener("click", (e) => {
                if(e.target.classList.contains("option-button")) {
                    // 이전에 선택된 버튼의 'selected' 클래스 제거 (필요시)
                    const prevSelected = optsContainer.querySelector(".option-button.selected");
                    if (prevSelected) {
                        prevSelected.classList.remove("selected");
                    }
                    // 현재 클릭된 버튼에 'selected' 클래스 추가
                    e.target.classList.add("selected");

                    totalScore += parseInt(e.target.dataset.score, 10);
                    currentQ++;
                    
                    setTimeout(() => { // 다음 질문으로 넘어가는 딜레이
                        if(currentQ < quizData.length) {
                            loadQ();
                        } else {
                            showResult();
                        }
                    }, 300); // 0.3초 딜레이
                }
            });

            ctaBtn.addEventListener("click", () => {
                if(currentQ < quizData.length) {
                    alert("모든 질문에 답변해주세요!");
                } else {
                    showResult();
                }
            });

            function showResult() {
                let title = "", desc = "";
                if(totalScore >= 21) { title = "생존의 달인 (베어그릴스 강림)"; desc = "자연과 하나가 되어 무인도를 리조트처럼 즐기고 있습니다. 뛰어난 위기 대처 능력과 풍부한 지식으로 어떤 상황에서도 살아남을 수 있어요. 오히려 무인도에서 새로운 삶을 개척할지도 모릅니다!"; }
                else if(totalScore >= 15) { title = "의지의 한국인"; desc = "끈질긴 생명력과 강한 의지로 어떤 난관도 헤쳐나가는 끈기의 아이콘입니다. 포기하지 않고 끝까지 버텨 결국 구조되는 모습을 보여줄 거예요. 약간의 지식만 더해진다면 완벽한 생존자가 될 수 있습니다."; }
                else if(totalScore >= 8) { title = "로빈슨 크루소 워너비"; desc = "나름대로 노력은 하지만 서툰 솜씨로 고생을 사서 하는 스타일입니다. 기본적인 생존 기술을 익히고 계획을 세우는 연습이 필요해요. 혼자보다는 동료와 함께하는 것이 좋습니다."; }
                else { title = "하루살이 생존자"; desc = "야생에서의 생존은 당신에게 너무나 가혹합니다. 멘탈 붕괴와 함께 의욕을 상실하기 쉬워요. 빠르게 구조 신호를 보내는 것이 최우선입니다."; }

                document.querySelector(".result-type").textContent = `결과: ${title}`;
                document.querySelector(".result-description").textContent = desc;

                document.getElementById("quiz-section").style.display = "none";
                const loadingOverlay = document.querySelector(".loading-overlay");
                const resultSection = document.getElementById("result-section");
                
                loadingOverlay.classList.add("show");
                setTimeout(() => {
                    loadingOverlay.classList.remove("show");
                    resultSection.style.display = "block";
                }, 2000);
            }
            loadQ();
        });
    </script>
</body>
</html>
