<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물 환생 테스트 | Life Test</title>
    <meta name="description" content="내가 다시 태어난다면 어떤 동물일까? 성향 테스트로 알아보는 나의 환생 동물!">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <!-- 상단 헤더 -->
        <header class="header">
            <div class="logo">Life Test</div>
            <div class="hamburger-menu">☰</div>
            <nav class="full-screen-nav">
                <div class="close-button">X</div>
                <ul id="content-list"></ul>
            </nav>
        </header>

        <main class="main-content">
            <div class="content-wrapper">
                <article class="content-area">
                    <div id="quiz-section">
                        <h1 class="content-title">동물 환생 테스트</h1>
                        <p class="content-description">지금의 내 성격과 생활 습관을 반영한다면, 다음 생엔 어떤 동물로 태어나게 될까요?</p>

                        <div class="question-container">
                            <div class="question current-question">
                                <p class="question-text">1. 휴일 아침, 눈을 떴을 때 나의 모습은?</p>
                                <div class="options">
                                    <button class="option-button" data-val="A">벌떡 일어나 밖으로 나갈 준비를 한다</button>
                                    <button class="option-button" data-val="B">이불 속에서 뒹굴거리며 여유를 즐긴다</button>
                                </div>
                            </div>
                        </div>

                        <div class="input-form">
                            <button class="cta-button">결과 보기</button>
                        </div>
                    </div>

                    <!-- 결과 화면 -->
                    <div id="result-section" style="display: none;">
                        <h2>당신의 환생 동물은?!</h2>
                        <p class="result-description">분석 중...</p>
                        <p class="result-type">결과: 자유로운 영혼의 고양이</p>
                        
                        <div class="explore-banner">
                            <h3>다른 재미있는 테스트도 해보세요!</h3>
                            <div class="explore-item">
                                <div class="explore-text">
                                    <p class="explore-title">다른 콘텐츠 타이틀</p>
                                    <p class="explore-hook">클릭 유도 후킹 멘트</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </article>
            </div>
        </main>

        <!-- 푸터 -->
        <footer class="footer">
            <p>&copy; 2026 Life Test. All rights reserved.</p>
        </footer>
    </div>

    <!-- 로딩 오버레이 -->
    <div class="loading-overlay">
        <div class="loading-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script>
        const quizData = [
            { question: "1. 휴일 아침, 눈을 떴을 때 나의 모습은?" },
            { question: "2. 친구들과 밥을 먹으러 갔다. 메뉴 고르기 담당은?" },
            { question: "3. 낯선 사람과 단둘이 남겨졌을 때 나의 태도는?" }
        ];

        let currentQ = 0;
        let scores = { A: 0, B: 0 };

        document.addEventListener('DOMContentLoaded', () => {
            const qText = document.querySelector('.question-text');
            const optsContainer = document.querySelector('.options');
            const ctaBtn = document.querySelector('.cta-button');

            function loadQ() {
                if(currentQ < quizData.length) {
                    qText.textContent = quizData[currentQ].question;
                }
            }

            optsContainer.addEventListener('click', (e) => {
                if(e.target.classList.contains('option-button')) {
                    const val = e.target.dataset.val || 'A';
                    scores[val]++;
                    currentQ++;
                    if(currentQ < quizData.length) loadQ();
                }
            });

            ctaBtn.addEventListener('click', () => {
                let title = "", desc = "";
                if(scores.A > scores.B) { 
                    title = "에너지 넘치는 리트리버"; 
                    desc = "사람을 좋아하고 언제나 긍정적인 에너지를 뿜어내는 당신은 대형견의 피가 흐릅니다."; 
                } else { 
                    title = "도도한 매력의 고양이"; 
                    desc = "독립심이 강하고 자기만의 시간을 중요시하는 당신은 냥이 그 자체입니다."; 
                }

                document.querySelector('.result-type').textContent = `결과: ${title}`;
                document.querySelector('.result-description').textContent = desc;

                document.getElementById('quiz-section').style.display = 'none';
                const loadingOverlay = document.querySelector('.loading-overlay');
                const resultSection = document.getElementById('result-section');
                
                loadingOverlay.classList.add('show');
                setTimeout(() => {
                    loadingOverlay.classList.remove('show');
                    resultSection.style.display = 'block';
                }, 2000);
            });
        });
    </script>
</body>
</html>
