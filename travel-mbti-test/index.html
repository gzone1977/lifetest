<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>여행 스타일로 알아보는 나의 진짜 성격 | Life Test</title>
    <meta name="description" content="여행 취향으로 알아보는 나의 MBTI! 당신의 성격에 맞는 완벽한 여행지는 어디일까요?">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="logo">Life Test</div>
            <div class="hamburger-menu">☰</div>
            <nav class="full-screen-nav">
                <div class="close-button">X</div>
                <ul id="content-list"></ul>
            </nav>
        </header>

        <main class="main-content">
            <div class="content-wrapper">
                <article class="content-area">
                    <div id="quiz-section">
                        <h1 class="content-title">여행 스타일로 알아보는 나의 진짜 성격</h1>
                        <p class="content-description">계획형 vs 즉흥형? 당신의 여행 스타일로 숨겨진 진짜 성격을 파헤쳐 보세요!</p>
                        
                        <div class="question-container">
                            <div class="question current-question">
                                <p class="question-text">1. 여행 계획을 짤 때 나의 스타일은?</p>
                                <div class="options">
                                    <button class="option-button" data-type="J">세부 일정을 미리 다 세운다</button>
                                    <button class="option-button" data-type="P">큰 틀만 정하고 즉흥적으로 움직인다</button>
                                </div>
                            </div>
                        </div>

                        <div class="input-form">
                            <button class="cta-button">결과 보기</button>
                        </div>
                    </div>

                    <div id="result-section" style="display: none;">
                        <h2>당신의 여행 스타일 MBTI는?!</h2>
                        <p class="result-description">분석 결과가 여기에 나타납니다.</p>
                        <p class="result-type">결과: 계획적인 완벽주의자 여행가</p>
                        <div class="explore-banner">
                            <h3>다른 재미있는 테스트도 해보세요!</h3>
                            <div class="explore-item">
                                <div class="explore-text">
                                    <p class="explore-title">다른 콘텐츠 타이틀</p>
                                    <p class="explore-hook">클릭 유도 후킹 멘트</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </article>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Life Test. All rights reserved.</p>
        </footer>
    </div>

    <div class="loading-overlay">
        <div class="loading-dots">
            <span></span><span></span><span></span>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script>
        const quizData = [
            { question: "1. 여행 계획을 짤 때 나의 스타일은?", options: [{text: "세부 일정을 미리 다 세운다 (J)", val: "J"}, {text: "큰 틀만 정하고 즉흥적으로 움직인다 (P)", val: "P"}] },
            { question: "2. 여행지에서 예상치 못한 문제가 생겼다면?", options: [{text: "침착하게 해결책을 찾는다 (T)", val: "T"}, {text: "일단 당황하고 친구에게 도움을 요청한다 (F)", val: "F"}] },
            { question: "3. 새로운 여행지를 선택할 때, 무엇을 중요하게 생각하는가?", options: [{text: "유명한 관광 명소와 맛집 (S)", val: "S"}, {text: "숨겨진 보석 같은 장소와 특별한 경험 (N)", val: "N"}] },
            { question: "4. 여행지에서 새로운 사람들을 만났을 때, 나의 행동은?", options: [{text: "먼저 다가가 대화를 시작한다 (E)", val: "E"}, {text: "조용히 경계를 풀고 상대방의 접근을 기다린다 (I)", val: "I"}] },
            { question: "5. 여행 기념품을 고를 때, 나는?", options: [{text: "실용적이고 오래 사용할 수 있는 것을 산다 (S)", val: "S"}, {text: "독특하고 의미 있는 것을 찾아본다 (N)", val: "N"}] },
            { question: "6. 여행 중 길을 잃었다. 나의 반응은?", options: [{text: "지도를 확인하고 논리적으로 길을 찾는다 (T)", val: "T"}, {text: "당황하지만 긍정적으로 생각하며 새로운 길을 탐험한다 (F)", val: "F"}] },
            { question: "7. 숙소를 고를 때 가장 중요하게 생각하는 것은?", options: [{text: "편안함과 청결 (J)", val: "J"}, {text: "특별한 분위기와 개성 (P)", val: "P"}] },
            { question: "8. 여행이 끝나고 집에 돌아왔을 때, 나의 기분은?", options: [{text: "아쉽지만 일상으로 돌아갈 준비를 한다 (E)", val: "E"}, {text: "여행의 추억을 곱씹으며 다음 여행을 꿈꾼다 (I)", val: "I"}] }
        ];

        const results = [
            { type: "ESTJ", title: "계획적인 완벽주의자 여행가", desc: "당신은 ESTJ 유형의 여행가! 효율적이고 계획적인 성격으로 완벽한 여행을 추구합니다. 모든 일정을 미리 짜고, 예상치 못한 상황에도 침착하게 대응하여 최고의 여행을 만듭니다." },
            { type: "INFP", title: "감성 가득한 힐링 여행가", desc: "당신은 INFP 유형의 여행가! 감성적이고 사려 깊은 성격으로, 여행에서 영감을 얻고 내면의 평화를 찾습니다. 아름다운 풍경과 특별한 경험을 통해 힐링하는 것을 즐깁니다." },
            { type: "ENFP", title: "즉흥적이고 자유로운 영혼의 여행가", desc: "당신은 ENFP 유형의 여행가! 즉흥적이고 에너지가 넘치는 성격으로, 새로운 만남과 예측 불가능한 모험을 즐깁니다. 여행지에서 우연히 만난 사람들과도 금방 친구가 됩니다." },
            { type: "ISTJ", title: "실용적이고 신중한 탐험가", desc: "당신은 ISTJ 유형의 여행가! 실용적이고 신중한 성격으로, 안전하고 믿을 수 있는 여행을 선호합니다. 철저한 준비와 계획으로 낯선 곳에서도 불편함 없이 여행을 즐깁니다." },
            { type: "ESFJ", title: "사람과 함께하는 즐거운 여행가", desc: "당신은 ESFJ 유형의 여행가! 사교적이고 정이 많은 성격으로, 친구나 가족과 함께하는 여행을 가장 행복하게 생각합니다. 모두가 즐거운 여행이 되도록 분위기를 이끌고 배려합니다." },
            { type: "INTJ", title: "독립적이고 분석적인 모험가", desc: "당신은 INTJ 유형의 여행가! 독립적이고 분석적인 성격으로, 자신만의 방식으로 여행을 탐험합니다. 깊이 있는 지식과 통찰력으로 여행지의 숨겨진 매력을 발견합니다." },
            { type: "ISFJ", title: "편안하고 아늑한 휴식형 여행가", desc: "당신은 ISFJ 유형의 여행가! 조용하고 성실한 성격으로, 편안하고 아늑한 휴식을 즐기는 여행을 선호합니다. 익숙한 장소에서 안정감을 느끼며, 여유로운 시간을 보냅니다." },
            { type: "ENTP", title: "도전적이고 호기심 넘치는 개척자", desc: "당신은 ENTP 유형의 여행가! 도전적이고 호기심이 많은 성격으로, 새로운 경험과 지적 자극을 찾아 여행합니다. 틀에 얽매이지 않고 자유롭게 탐험하며 자신만의 여행 스타일을 만듭니다." },
            { type: "ESTP", title: "활동적이고 스릴 넘치는 액티비티 여행가", desc: "당신은 ESTP 유형의 여행가! 활동적이고 스릴 넘치는 성격으로, 익스트림 스포츠나 모험적인 활동을 즐깁니다. 몸으로 부딪히며 새로운 경험을 하는 것을 좋아합니다." },
            { type: "INFJ", title: "깊이 있는 통찰의 문화 여행가", desc: "당신은 INFJ 유형의 여행가! 통찰력 있고 이해심이 깊은 성격으로, 역사와 문화에 대한 깊이 있는 경험을 추구합니다. 조용히 사색하며 여행지의 의미를 되새깁니다." },
            { type: "ENFJ", title: "함께 만드는 아름다운 추억의 여행가", desc: "당신은 ENFJ 유형의 여행가! 이타적이고 열정적인 성격으로, 사람들과 함께 아름다운 추억을 만드는 것을 중요하게 생각합니다. 여행지에서 만난 사람들에게도 긍정적인 영향을 줍니다." },
            { type: "ISTP", title: "자유로운 영혼의 백패커", desc: "당신은 ISTP 유형의 여행가! 자유롭고 실용적인 성격으로, 계획에 얽매이지 않고 발길 닿는 대로 떠나는 백패킹을 즐깁니다. 자연 속에서 진정한 자유를 느낍니다." },
            { type: "ENTJ", title: "목표 지향적인 전략가 여행가", desc: "당신은 ENTJ 유형의 여행가! 결단력 있고 목표 지향적인 성격으로, 여행에서도 효율성과 성과를 중요하게 생각합니다. 최고의 효율로 최고의 여행을 만들어냅니다." },
            { type: "INTP", title: "새로운 지식 탐구형 여행가", desc: "당신은 INTP 유형의 여행가! 논리적이고 독창적인 성격으로, 여행지에서 새로운 지식을 얻고 탐구하는 것을 즐깁니다. 자신만의 관심사에 따라 특별한 여행 코스를 만듭니다." },
            { type: "ISFP", title: "예술적 감성의 자연주의 여행가", desc: "당신은 ISFP 유형의 여행가! 예술적이고 감성적인 성격으로, 자연의 아름다움과 예술적인 영감을 찾아 여행합니다. 조용히 자연 속에서 휴식하며 자신을 돌아봅니다." },
            { type: "ESFP", title: "흥과 즐거움 가득한 파티 여행가", desc: "당신은 ESFP 유형의 여행가! 개방적이고 활동적인 성격으로, 여행지에서 새로운 사람들과 어울리며 파티를 즐기는 것을 좋아합니다. 매 순간을 즐기고 즉흥적인 유희를 추구합니다." }
        ];

        let currentQ = 0;
        let mbtiScores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        document.addEventListener("DOMContentLoaded", () => {
            const qText = document.querySelector(".question-text");
            const optsContainer = document.querySelector(".options");
            const ctaBtn = document.querySelector(".cta-button");

            function loadQ() {
                if(currentQ < quizData.length) {
                    qText.textContent = quizData[currentQ].question;
                    optsContainer.innerHTML = ""; // 기존 옵션 초기화
                    quizData[currentQ].options.forEach(opt => {
                        optsContainer.innerHTML += `<button class="option-button" data-type="${opt.val}">${opt.text}</button>`;
                    });
                } else {
                     // 모든 질문 완료 후 버튼 활성화 또는 이동 로직 (필요시 추가)
                }
            }
            
            loadQ();

            optsContainer.addEventListener("click", (e) => {
                if(e.target.classList.contains("option-button")) {
                    mbtiScores[e.target.dataset.type]++;
                    currentQ++;
                    if(currentQ < quizData.length) {
                        loadQ();
                    } else {
                         showResult();
                    }
                }
            });

            ctaBtn.addEventListener("click", () => {
                 if(currentQ < quizData.length) {
                     alert("모든 질문에 답변해주세요!");
                 } else {
                     showResult();
                 }
            });

            function showResult() {
                let mbtiType = "";
                mbtiType += mbtiScores.E > mbtiScores.I ? "E" : "I";
                mbtiType += mbtiScores.S > mbtiScores.N ? "S" : "N";
                mbtiType += mbtiScores.T > mbtiScores.F ? "T" : "F";
                mbtiType += mbtiScores.J > mbtiScores.P ? "J" : "P";

                let finalResult = results.find(r => r.type === mbtiType) || results[0];

                document.querySelector(".result-type").textContent = `결과: ${finalResult.title}`;
                document.querySelector(".result-description").textContent = finalResult.desc;

                document.getElementById("quiz-section").style.display = "none";
                const loadingOverlay = document.querySelector(".loading-overlay");
                const resultSection = document.getElementById("result-section");
                
                loadingOverlay.classList.add("show");
                setTimeout(() => {
                    loadingOverlay.classList.remove("show");
                    resultSection.style.display = "block";
                }, 2000);
            }
        });
    </script>
</body>
</html>
