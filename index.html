<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Test - 모든 콘텐츠</title>
    <meta name="description" content="MZ세대를 위한 재미있는 심리 테스트, 운세, MBTI 콘텐츠 모음">
    <link rel="stylesheet" href="css/style.css">
    <!-- JSON-LD 구조화 데이터 삽입 예정 -->
</head>
<body>
    <div class="container">
        <!-- 상단 헤더 -->
        <header class="header">
            <div class="logo">Life Test</div>
            <div class="hamburger-menu">☰</div>
            <nav class="full-screen-nav">
                <div class="close-button">X</div>
                <ul id="content-list">
                    <!-- 콘텐츠 목록이 여기에 동적으로 로드됩니다 -->
                </ul>
            </nav>
        </header>

        <!--
        <div class="ad-banner top-width-ad">
            <div class="ad-placeholder">광고: 상단 가로형 배너</div>
        </div>
        -->

        <main class="main-content">
            <h1 class="content-title">모든 Life Test 콘텐츠</h1>
            <p class="content-description">재미있는 심리 테스트와 운세 콘텐츠를 모두 만나보세요!</p>
            <div id="all-contents-grid" class="content-grid">
                <!-- 모든 콘텐츠가 여기에 동적으로 로드됩니다 -->
            </div>
        </main>

        <!--
        <div class="ad-banner bottom-width-ad">
            <div class="ad-placeholder">광고: 하단 가로형 배너</div>
        </div>
        -->

        <!-- 푸터 -->
        <footer class="footer">
            <p>&copy; 2026 Life Test. All rights reserved.</p>
        </footer>
    </div>

    <script src="js/script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const contentGrid = document.getElementById("all-contents-grid");
            const contentListNav = document.getElementById("content-list");

            const contents = [
                { title: "나와 찰떡궁합인 간식은?", path: "snack-mbti-test", thumbnail: "https://via.placeholder.com/400x300?text=Snack" },
                { title: "전생에 나는 어떤 동물이었을까?", path: "animal-reincarnation-test", thumbnail: "https://via.placeholder.com/400x300?text=Animal" },
                { title: "스트레스 해소법으로 알아보는 나의 성향", path: "stress-coping-test", thumbnail: "https://via.placeholder.com/400x300?text=Stress" },
                { title: "여행 스타일로 알아보는 나의 진짜 성격", path: "travel-mbti-test", thumbnail: "https://via.placeholder.com/400x300?text=Travel" },
                { title: "무인도에 떨어졌을 때 나의 생존 전략", path: "island-survival-test", thumbnail: "https://via.placeholder.com/400x300?text=Island" }
            ];

            contents.forEach(content => {
                // 메인 콘텐츠 그리드에 추가
                contentGrid.innerHTML += `
                    <a href="./${content.path}/index.html" class="content-card">
                        <div class="content-card-thumbnail">
                            <img src="${content.thumbnail}" alt="${content.title} 썸네일">
                        </div>
                        <h3 class="content-card-title">${content.title}</h3>
                        <p class="content-card-description">나의 ${content.title}을(를) 지금 바로 알아보세요!</p>
                    </a>
                `;

                // 네비게이션 목록에 추가
                contentListNav.innerHTML += `<li><a href="./${content.path}/index.html">${content.title}</a></li>`;
            });
        });
    </script>
</body>
</html>
