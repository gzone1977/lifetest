<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연애 세포 생존 테스트 | Life Test</title>
    <meta name="description" content="당신의 연애 세포는 안녕하신가요? 심리 테스트로 연애 세포 생존율을 알아보세요!">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <!-- 상단 헤더 -->
        <header class="header">
            <a href="/" class="home-icon">🏠</a> <!-- Home 이모티콘 -->
            <div class="logo">Life Test</div>
            <div class="hamburger-menu">☰</div>
            <nav class="full-screen-nav">
                <div class="close-button">X</div>
                <ul id="content-list">
                    <!-- 콘텐츠 목록이 여기에 동적으로 로드됩니다 -->
                </ul>
            </nav>
        </header>

        <!--
        <div class="ad-banner top-width-ad">
            <div class="ad-placeholder">광고: 상단 가로형 배너</div>
        </div>
        -->

        <main class="main-content">
            <div class="content-wrapper">
                <!--
                <aside class="ad-skyscraper left-height-ad">
                    <div class="ad-placeholder-vertical">광고: 좌측 세로형</div>
                </aside>
                -->

                <article class="content-area">
                    <div id="quiz-section">
                        <h1 class="content-title">연애 세포 생존 테스트</h1>
                        <p class="content-description">오랫동안 연애를 쉬었거나, 혹시 내 연애 세포가 다 죽은 건 아닐까 걱정되나요? 지금 바로 확인해보세요!</p>

                        <!--
                        <div class="ad-banner body-ad-01">
                            <div class="ad-placeholder">광고: 본문 상단</div>
                        </div>
                        -->

                        <div class="question-container">
                            <!-- 질문이 여기에 동적으로 로드됩니다 -->
                            <div class="question current-question">
                                <p class="question-text">1. 로맨스 드라마나 영화를 볼 때 감흥이 없다.</p>
                                <div class="options">
                                    <!-- 옵션 버튼들이 여기에 동적으로 로드됩니다 -->
                                </div>
                            </div>
                        </div>

                        <!--
                        <div class="ad-banner body-ad-02">
                            <div class="ad-placeholder">광고: 본문 하단</div>
                        </div>
                        -->

                        <div class="input-form">
                            <button class="cta-button">결과 보기</button>
                        </div>
                    </div>

                    <!-- 결과 화면 (초기에는 숨김) -->
                    <div id="result-section" style="display: none;">
                        <h2>당신의 연애 세포 상태는?!</h2>
                        <p class="result-description">이곳에 테스트 결과에 대한 상세 설명이 들어갑니다.</p>
                        <p class="result-type">결과: 심정지 직전</p>
                        <!-- 탐험 유도 배너 -->
                        <div class="explore-banner">
                            <h3>다른 재미있는 테스트도 해보세요!</h3>
                            <div class="explore-item">
                                <div class="explore-text">
                                    <p class="explore-title">다른 콘텐츠 타이틀</p>
                                    <p class="explore-hook">클릭 유도 후킹 멘트</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </article>

                <!--
                <aside class="ad-skyscraper right-height-ad">
                    <div class="ad-placeholder-vertical">광고: 우측 세로형</div>
                </aside>
                -->
            </div>
        </main>

        <!--
        <div class="ad-banner bottom-width-ad">
            <div class="ad-placeholder">광고: 하단 가로형 배너</div>
        </div>
        -->

        <!-- 푸터 -->
        <footer class="footer">
            <p>&copy; 2026 Life Test. All rights reserved.</p>
        </footer>
    </div>

    <!-- 로딩 오버레이 -->
    <div class="loading-overlay">
        <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script>
        const quizData = [
            { question: "1. 로맨스 드라마나 영화를 볼 때 감흥이 없다.", options: [{text: "매우 그렇다", score: 3}, {text: "그렇다", score: 2}, {text: "가끔 그렇다", score: 1}, {text: "전혀 그렇지 않다", score: 0}] },
            { question: "2. 매주 주말 혼자 보내는 시간이 가장 편하고 즐겁다.", options: [{text: "매우 그렇다", score: 3}, {text: "그렇다", score: 2}, {text: "가끔 그렇다", score: 1}, {text: "전혀 그렇지 않다", score: 0}] },
            { question: "3. 누군가 나에게 호감을 보여도 귀찮게 느껴진다.", options: [{text: "매우 그렇다", score: 3}, {text: "그렇다", score: 2}, {text: "가끔 그렇다", score: 1}, {text: "전혀 그렇지 않다", score: 0}] },
            { question: "4. 데이트 준비를 하는 상상만 해도 피곤하다.", options: [{text: "매우 그렇다", score: 3}, {text: "그렇다", score: 2}, {text: "가끔 그렇다", score: 1}, {text: "전혀 그렇지 않다", score: 0}] },
            { question: "5. 다른 사람들의 연애 이야기를 들어도 부럽지 않다.", options: [{text: "매우 그렇다", score: 3}, {text: "그렇다", score: 2}, {text: "가끔 그렇다", score: 1}, {text: "전혀 그렇지 않다", score: 0}] },
            { question: "6. 소개팅에서 애프터 신청이 들어와도 선뜻 나서기가 어렵다.", options: [{text: "매우 그렇다", score: 3}, {text: "그렇다", score: 2}, {text: "가끔 그렇다", score: 1}, {text: "전혀 그렇지 않다", score: 0}] },
            { question: "7. 길을 가다 손잡고 가는 커플을 보면 아무런 감흥이 없다.", options: [{text: "매우 그렇다", score: 3}, {text: "그렇다", score: 2}, {text: "가끔 그렇다", score: 1}, {text: "전혀 그렇지 않다", score: 0}] },
            { question: "8. SNS에서 친구들의 염장샷을 봐도 시큰둥하다.", options: [{text: "매우 그렇다", score: 3}, {text: "그렇다", score: 2}, {text: "가끔 그렇다", score: 1}, {text: "전혀 그렇지 않다", score: 0}] }
        ];

        const results = [
            { maxScore: 5, title: "연애 세포 만렙! (불꽃 로맨티스트)", desc: "당신의 연애 세포는 활활 타오르는 불꽃처럼 뜨겁습니다. 언제든 사랑에 빠질 준비가 되어있고, 새로운 관계에 대한 설렘으로 가득하네요. 곧 핑크빛 로맨스가 당신을 찾아올 것입니다! 주변을 잘 살펴보세요." },
            { maxScore: 10, title: "연애 세포 생존 (심장 박동 중)", desc: "당신의 연애 세포는 잠시 휴식기를 가졌을 뿐, 여전히 미약하게나마 심장 박동을 이어가고 있습니다. 좋은 사람을 만나면 언제든 다시 활력을 되찾을 준비가 되어 있어요. 작은 설렘부터 시작해보는 건 어떨까요?" },
            { maxScore: 15, title: "연애 세포 동면 중 (겨울잠 모드)", desc: "당신의 연애 세포는 깊은 겨울잠에 빠져 동면 중입니다. 사랑보다는 자기계발이나 취미 생활에 더 집중하고 있는 듯 보이네요. 하지만 작은 변화와 새로운 인연에 대한 열린 마음은 언제든 세포를 깨울 수 있습니다." },
            { maxScore: 24, title: "연애 세포 심정지 직전 (응급처치 필요)", desc: "경고! 당신의 연애 세포는 심정지 직전의 위급한 상태입니다. 연애에 대한 흥미와 관심이 거의 사라진 상태로, 심폐소생술이 시급합니다. 의식적으로 설레는 일들을 만들고, 새로운 사람들에게 마음을 열어보는 노력이 필요합니다. 조금만 더 노력하면 다시 살아날 수 있어요!" }
        ];

        let currentQuestionIndex = 0;
        let totalScore = 0;

        document.addEventListener("DOMContentLoaded", () => {
            const questionText = document.querySelector(".question-text");
            const optionsContainer = document.querySelector(".options");
            const ctaButton = document.querySelector(".cta-button");

            function loadQuestion() {
                if (currentQuestionIndex < quizData.length) {
                    questionText.textContent = quizData[currentQuestionIndex].question;
                    optionsContainer.innerHTML = ""; // 기존 옵션 초기화
                    quizData[currentQuestionIndex].options.forEach(opt => {
                        optionsContainer.innerHTML += `<button class="option-button" data-score="${opt.score}">${opt.text}</button>`;
                    });
                }
            }

            optionsContainer.addEventListener("click", (e) => {
                if(e.target.classList.contains("option-button")) {
                    // 이전에 선택된 버튼의 'selected' 클래스 제거
                    const prevSelected = optionsContainer.querySelector(".option-button.selected");
                    if (prevSelected) {
                        prevSelected.classList.remove("selected");
                    }
                    // 현재 클릭된 버튼에 'selected' 클래스 추가
                    e.target.classList.add("selected");

                    const score = parseInt(e.target.dataset.score, 10);
                    totalScore += score;
                    currentQuestionIndex++;
                    
                    // setTimeout 제거 및 즉시 로드
                    if (currentQuestionIndex < quizData.length) {
                        loadQuestion();
                    } else {
                        showResult();
                    }
                }
            });

            ctaButton.addEventListener("click", () => {
                // 모든 질문에 답변했는지 확인
                // 현재 질문이 남아있으면 alert, 아니면 결과 보기
                if (currentQuestionIndex < quizData.length) {
                    alert("모든 질문에 답변해주세요!");
                } else {
                    showResult();
                }
            });

            function showResult() {
                let finalResult = results[results.length - 1]; // 기본값은 마지막 결과
                for (let r of results) {
                    if (totalScore <= r.maxScore) {
                        finalResult = r;
                        break;
                    }
                }
                
                document.querySelector(".result-description").textContent = finalResult.desc;
                document.querySelector(".result-type").textContent = `결과: ${finalResult.title}`;
                
                document.getElementById("quiz-section").style.display = "none";
                const loadingOverlay = document.querySelector(".loading-overlay");
                const resultSection = document.getElementById("result-section");
                
                loadingOverlay.classList.add("show");
                setTimeout(() => {
                    loadingOverlay.classList.remove("show");
                    resultSection.style.display = "block";
                }, 2000);
            }

            loadQuestion(); // 페이지 로드 시 첫 질문 로드
        });
    </script>
</body>
</html>
