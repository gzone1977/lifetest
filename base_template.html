<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테스트 제목 | Life Test</title>
    <meta name="description" content="테스트 설명">
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"> <!-- Google Fonts Icons 추가 -->
</head>
<body>
    <div class="container">
        <!-- 상단 헤더 -->
        <header class="header">
            <a href="/" class="home-icon"><span class="material-icons">home</span></a> <!-- Home 이모티콘 변경 -->
            <div class="logo">Life Test</div>
            <div class="hamburger-menu">☰</div>
            <nav class="full-screen-nav">
                <div class="close-button">X</div>
                <ul id="content-list">
                    <!-- 콘텐츠 목록이 여기에 동적으로 로드됩니다 -->
                </ul>
            </nav>
        </header>

        <!--
        <div class="ad-banner top-width-ad">
            <div class="ad-placeholder">광고: 상단 가로형 배너</div>
        </div>
        -->

        <main class="main-content">
            <div class="content-wrapper">
                <!--
                <aside class="ad-skyscraper left-height-ad">
                    <div class="ad-placeholder-vertical">광고: 좌측 세로형</div>
                </aside>
                -->

                <article class="content-area">
                    <div id="quiz-section">
                        <h1 class="content-title">테스트 제목</h1>
                        <p class="content-description">테스트 설명</p>

                        <!--
                        <div class="ad-banner body-ad-01">
                            <div class="ad-placeholder">광고: 본문 상단</div>
                        </div>
                        -->

                        <div class="question-container">
                            <!-- 질문이 여기에 동적으로 로드됩니다 -->
                            <div class="question current-question">
                                <p class="question-text"></p>
                                <div class="options">
                                    <!-- 옵션 버튼들이 여기에 동적으로 로드됩니다 -->
                                </div>
                            </div>
                        </div>

                        <!--
                        <div class="ad-banner body-ad-02">
                            <div class="ad-placeholder">광고: 본문 하단</div>
                        </div>
                        -->

                        <div class="input-form">
                            <button class="cta-button">결과 보기</button>
                        </div>
                    </div>

                    <!-- 결과 화면 (초기에는 숨김) -->
                    <div id="result-section" style="display: none;">
                        <h2>테스트 결과 제목</h2>
                        <p class="result-description">테스트 결과 상세 설명이 들어갑니다.</p>
                        <p class="result-type">결과 유형</p>
                        <!-- 탐험 유도 배너 -->
                        <div class="explore-banner">
                            <h3>다른 재미있는 테스트도 해보세요!</h3>
                            <div class="explore-item">
                                <div class="explore-text">
                                    <p class="explore-title">다른 콘텐츠 타이틀</p>
                                    <p class="explore-hook">클릭 유도 후킹 멘트</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </article>

                <!--
                <aside class="ad-skyscraper right-height-ad">
                    <div class="ad-placeholder-vertical">광고: 우측 세로형</div>
                </aside>
                -->
            </div>
        </main>

        <!--
        <div class="ad-banner bottom-width-ad">
            <div class="ad-placeholder">광고: 하단 가로형 배너</div>
        </div>
        -->

        <!-- 푸터 -->
        <footer class="footer">
            <p>&copy; 2026 Life Test. All rights reserved.</p>
        </footer>
    </div>

    <!-- 로딩 오버레이 -->
    <div class="loading-overlay">
        <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <!-- 개별 테스트 스크립트가 로드될 위치 -->
</body>
</html>
