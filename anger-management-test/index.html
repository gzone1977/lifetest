<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분노조절장애 테스트 | Life Test</title>
    <meta name="description" content="당신의 분노 조절 능력은? 지금 바로 심리 테스트로 알아보세요!">
    <link rel="stylesheet" href="../css/style.css">
    <!-- JSON-LD 구조화 데이터 삽입 예정 -->
</head>
<body>
    <div class="container">
        <!-- 상단 헤더 -->
        <header class="header">
            <div class="logo">Life Test</div>
            <div class="hamburger-menu">☰</div>
            <nav class="full-screen-nav">
                <div class="close-button">X</div>
                <ul id="content-list">
                    <!-- 콘텐츠 목록이 여기에 동적으로 로드됩니다 -->
                </ul>
            </nav>
        </header>

        <!--
        <div class="ad-banner top-width-ad">
            <div class="ad-placeholder">광고: 상단 가로형 배너</div>
        </div>
        -->

        <main class="main-content">
            <div class="content-wrapper">
                <!--
                <aside class="ad-skyscraper left-height-ad">
                    <div class="ad-placeholder-vertical">광고: 좌측 세로형</div>
                </aside>
                -->

                <article class="content-area">
                    <div id="quiz-section">
                        <h1 class="content-title">분노조절장애 테스트</h1>
                        <p class="content-description">사소한 일에도 욱하는 당신? 내 안의 화를 다스리는 법을 테스트를 통해 찾아보세요.</p>
                        <div class="thumbnail-image-wrapper">
                            <img src="../images/anger_thumbnail.png" alt="분노조절장애 테스트 썸네일">
                        </div>

                        <!--
                        <div class="ad-banner body-ad-01">
                            <div class="ad-placeholder">광고: 본문 상단</div>
                        </div>
                        -->

                        <div class="question-container">
                            <!-- 질문이 여기에 동적으로 로드됩니다 -->
                            <div class="question current-question">
                                <p class="question-text">1. 나는 쉽게 화를 내는 편이다.</p>
                                <div class="options">
                                    <button class="option-button" data-score="3">매우 그렇다</button>
                                    <button class="option-button" data-score="2">그렇다</button>
                                    <button class="option-button" data-score="1">그렇지 않다</button>
                                    <button class="option-button" data-score="0">전혀 그렇지 않다</button>
                                </div>
                            </div>
                        </div>

                        <!--
                        <div class="ad-banner body-ad-02">
                            <div class="ad-placeholder">광고: 본문 하단</div>
                        </div>
                        -->

                        <div class="input-form">
                            <button class="cta-button">결과 보기</button>
                        </div>
                    </div>

                    <!-- 결과 화면 (초기에는 숨김) -->
                    <div id="result-section" style="display: none;">
                        <h2>당신의 분노 지수는?!</h2>
                        <div class="result-image-wrapper">
                            <img src="../images/anger_thumbnail.png" alt="결과 이미지">
                        </div>
                        <p class="result-description">이곳에 테스트 결과에 대한 상세 설명이 들어갑니다. 당신은 평온함을 유지하는 타입입니다.</p>
                        <p class="result-type">분노 지수: 낮음 (평온한 사자)</p>
                        <!-- 탐험 유도 배너 -->
                        <div class="explore-banner">
                            <h3>다른 재미있는 테스트도 해보세요!</h3>
                            <div class="explore-item">
                                <div class="explore-thumbnail"><img src="../images/anger_thumbnail.png" alt="다른 콘텐츠 썸네일"></div>
                                <div class="explore-text">
                                    <p class="explore-title">다른 콘텐츠 타이틀</p>
                                    <p class="explore-hook">클릭 유도 후킹 멘트</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </article>

                <!--
                <aside class="ad-skyscraper right-height-ad">
                    <div class="ad-placeholder-vertical">광고: 우측 세로형</div>
                </aside>
                -->
            </div>
        </main>

        <div class="ad-banner bottom-width-ad">
            <!-- data-ad-client="ca-pub-9335289087106264" data-ad-slot="9736597908" -->
            <div class="ad-placeholder">광고: 하단 가로형 배너</div>
        </div>

        <!-- 푸터 -->
        <footer class="footer">
            <p>&copy; 2026 Life Test. All rights reserved.</p>
        </footer>
    </div>

    <!-- 로딩 오버레이 -->
    <div class="loading-overlay">
        <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>

    <script src="../js/script.js"></script>
</body>
</html>
